<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indstillinger</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>Indstillinger</h1>
            <p>Her kan grænseværdier og automatisk vanding ændres.</p>
        </header>

        <nav class="nav">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('history_page') }}">Historik</a>
            <a href="{{ url_for('settings_page') }}" class="active">Indstillinger</a>
        </nav>

        <section class="panel settings-panel">
            <h2>Systemindstillinger</h2>

            <form action="{{ url_for('settings_page') }}" method="POST">
                <label for="min_soil_moisture">Minimum jordfugtighed før vanding</label>
                <input type="number" step="0.1" id="min_soil_moisture" name="min_soil_moisture" value="{{ settings.min_soil_moisture }}">

                <label for="max_temperature">Maksimal temperatur</label>
                <input type="number" step="0.1" id="max_temperature" name="max_temperature" value="{{ settings.max_temperature }}">

                <label for="min_humidity">Minimum luftfugtighed</label>
                <input type="number" step="0.1" id="min_humidity" name="min_humidity" value="{{ settings.min_humidity }}">

                <label class="checkbox-row">
                    <input type="checkbox" name="auto_watering" {% if settings.auto_watering %}checked{% endif %}>
                    Automatisk vanding
                </label>

                <button class="btn green" type="submit">Gem indstillinger</button>
            </form>
        </section>
    </div>
</body>
</html>
