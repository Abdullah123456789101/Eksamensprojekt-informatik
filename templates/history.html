<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historik</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>Historik</h1>
            <p>Se tidligere målinger og hændelser fra drivhuset.</p>
        </header>

        <nav class="nav">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('history_page') }}" class="active">Historik</a>
            <a href="{{ url_for('settings_page') }}">Indstillinger</a>
        </nav>

        <section class="grid two-columns">
            <div class="panel">
                <h2>Målehistorik</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Tid</th>
                            <th>Jordfugtighed</th>
                            <th>Temperatur</th>
                            <th>Luftfugtighed</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <tr><td colspan="4">Indlæser...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="panel">
                <h2>Simpel graf</h2>
                <div id="history-bar-chart"></div>
            </div>
        </section>

        <section class="panel">
            <h2>Hændelseslog</h2>
            <ul class="simple-list" id="events-list">
                <li>Indlæser...</li>
            </ul>
        </section>
    </div>

    <script>
    async function fetchHistory() {
        try {
            const res = await fetch("/api/history");
            const json = await res.json();
            const history = json.history.reverse(); // ældste først

            // Opdater tabel
            const tbody = document.getElementById("history-table-body");
            tbody.innerHTML = history.map(row => `
                <tr>
                    <td>${row.time}</td>
                    <td>${row.soil_moisture}%</td>
                    <td>${row.temperature}°C</td>
                    <td>${row.humidity}%</td>
                </tr>
            `).join('');

            // Opdater simpel bar-graf
            const chart = document.getElementById("history-bar-chart");
            chart.innerHTML = history.map(row => `
                <div class="metric">
                    <div class="metric-top">
                        <span>${row.time}</span>
                        <span>${row.soil_moisture}%</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" style="width: ${row.soil_moisture}%;"></div>
                    </div>
                </div>
            `).join('');

            // Opdater hændelseslog
            const eventsList = document.getElementById("events-list");
            eventsList.innerHTML = json.events.map(e => `
                <li><strong>${e.time}</strong> - ${e.description}</li>
            `).join('');

        } catch (err) {
            console.error("Fejl ved historik-hentning:", err);
        }
    }

    // Kør med det samme og hvert 5. sekund
    fetchHistory();
    setInterval(fetchHistory, 5000);
    </script>
</body>
</html>
